[project]
name = "handumi"
version = "0.1.0"
description = "handumi robotics project"
requires-python = ">=3.12"
dependencies = [
    "lerobot[feetech]==0.5.1",
    "rerun-sdk>=0.24.0,<0.27.0",
    # Build tools for xrobotoolkit-sdk (CMake-based). Listed here so uv sync
    # tracks them in the lockfile and they are available when building the SDK.
    "cmake>=3.29",
    "pybind11>=2.13",
    "setuptools>=71",
    "python-dotenv==1.2.2",
    "pyyaml>=6.0",
    "opencv-python>=4.10,<5",
    # Axol IK solver (src/handumi/robots/axol/solver.py)
    "numpy>=2.0",
    "jax[cuda13]>=0.4.0",
    "jaxlie>=1.0.0",
    "jaxls @ git+https://github.com/brentyi/jaxls.git",
    "yourdfpy",
    "pyroki @ git+https://github.com/chungmin99/pyroki.git",
    # Viser utilities and pyroki transitive dependency, pinned direct.
    "viser>=1.0.0",
    "matplotlib>=3.11.0",
    "pyvista>=0.43.0",
    "scipy>=1.17.1",
]

[project.optional-dependencies]
piper = [
    "piper_sdk @ git+https://github.com/agilexrobotics/piper_sdk.git",
]

[project.scripts]
handumi-record = "handumi.scripts.record:main"
handumi-convert = "handumi.scripts.conversion:main"
handumi-setup-ports = "handumi.scripts.setup.setup_ports:main"
handumi-home-servos = "handumi.scripts.setup.home_servos:main"
handumi-calibrate-grippers = "handumi.scripts.setup.calibrate_grippers:main"
handumi-print-controller-pose = "handumi.scripts.setup.print_controller_pose:main"
handumi-calibrate-tcp-offset = "handumi.scripts.setup.calibrate_tcp_offset:main"
handumi-calibrate-workspace = "handumi.scripts.setup.calibrate_workspace:main"
handumi-train = "handumi.training.train:main"
handumi-replay-in-sim = "handumi.scripts.replay.replay_in_sim:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/handumi"]

[tool.hatch.build.targets.wheel.force-include]
"assets/axol" = "handumi/assets/axol"
"assets/piper" = "handumi/assets/piper"
"configs/robots" = "handumi/configs/robots"

[tool.hatch.build.targets.sdist]
include = ["src/handumi"]

[tool.uv]
no-build-isolation-package = ["xrobotoolkit-sdk"]

[tool.basedpyright]
venvPath = "."
venv = ".venv"
stubPath = "typings"
extraPaths = ["external_dependencies/XRoboToolkit-PC-Service-Pybind_X86_and_ARM64"]
reportMissingModuleSource = false

[tool.pyright]
venvPath = "."
venv = ".venv"
stubPath = "typings"
extraPaths = ["external_dependencies/XRoboToolkit-PC-Service-Pybind_X86_and_ARM64"]
reportMissingModuleSource = false
