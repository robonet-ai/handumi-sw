[project]
name = "dexumi"
version = "0.1.0"
description = "Dexumi robotics project"
requires-python = ">=3.12"
dependencies = [
    "lerobot[feetech,dataset]==0.5.1",
    # Build tools for xrobotoolkit-sdk (CMake-based). Listed here so uv sync
    # tracks them in the lockfile and they are available when building the SDK.
    "cmake>=3.29",
    "pybind11>=2.13",
    "setuptools>=71",
    "python-dotenv==1.2.2"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dexumi"]

[tool.hatch.build.targets.sdist]
include = ["src/dexumi"]

[tool.uv]
no-build-isolation-package = ["xrobotoolkit-sdk"]

[tool.basedpyright]
venvPath = "."
venv = ".venv"
stubPath = "typings"
extraPaths = ["external_dependencies/XRoboToolkit-PC-Service-Pybind_X86_and_ARM64"]
reportMissingModuleSource = false

[tool.pyright]
venvPath = "."
venv = ".venv"
stubPath = "typings"
extraPaths = ["external_dependencies/XRoboToolkit-PC-Service-Pybind_X86_and_ARM64"]
reportMissingModuleSource = false
