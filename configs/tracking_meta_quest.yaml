# Meta Quest tracking connection (yubi-style TCP/JSON + UDP time-sync).
#
# The PC dials the Quest: the Quest app is the TCP server, the workstation
# connects to quest_ip:tcp_port and binds the UDP sync_port.
#
# Calibration does NOT live here — see configs/calibration/ and
# docs/README_calibration.md.

backend: "meta_quest"

connection:
  quest_ip: "10.104.18.172" # Quest LAN IP (pin it; DHCP can change it)
  tcp_port: 65432 # pose stream (newline-delimited JSON)
  sync_port: 42000 # NTP-style UDP time-sync
  connect_retry_s: 1.0

health:
  # Frames older than this are exposed as untracked, even when the last JSON
  # payload said tracked=true. The recorder's 1s loss timeout is measured from
  # the receive timestamp of that last frame.
  frame_stale_timeout_s: 0.25

streams:
  left: true
  right: true
  hmd: true # used as the body/chest reference frame
  buttons: true # forwarded raw; Python owns the state machine
