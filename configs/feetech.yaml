# Feetech serial port assignment — machine-specific, edit for your rig
# (same pattern as configs/cameras.yaml). Find ports/ids with:
#   python scripts/setup/setup_ports.py
#
# Gripper-width calibration (open/closed ticks, max width in mm) is NOT here —
# it's a measured property of the physical gripper, not the wiring, and lives
# in a per-user cache so it's never committed:
#   ${XDG_CACHE_HOME:-~/.cache}/handumi/calibration.yaml
# Calibrate via:
#   python scripts/setup/home_servos.py
#   python scripts/setup/calibrate_grippers.py calibrate

baudrate: 1000000
protocol_version: 0
left:
  servo_id: 0
  port: /dev/ttyACM0
right:
  servo_id: 1
  port: /dev/ttyACM1
