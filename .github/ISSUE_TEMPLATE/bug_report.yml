name: Bug report
description: Report a reproducible software defect using synthetic or redacted evidence.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: >-
        Do not submit secrets, private addresses, participant/camera data,
        device identifiers, signing material, or unsafe robot incident details.
        Use SECURITY.md for private disclosure.
  - type: input
    id: commit
    attributes:
      label: HandUMI commit/version
      placeholder: Full Git commit or release tag
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Redacted environment
      description: OS, Python/runtime, dependency groups, and simulated hardware profile.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Exact commands and synthetic inputs.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed participant data, imagery, identifiers, addresses, tokens, and signing material.
          required: true
